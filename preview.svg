  <text x="220" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="700" letter-spacing="-2" fill="url(#fortnitefpsboosterpvAc)" filter="url(#fortnitefpsboosterpvGl)">FPS Booster</text>
  <text x="222" y="420" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#8b949e" letter-spacing="0.3">One-click Windows optimizer for smoother gameplay and higher frame rates</text>
