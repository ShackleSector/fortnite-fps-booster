<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="fortnitefpsboosterpvBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="fortnitefpsboosterpvAc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
    <linearGradient id="fortnitefpsboosterpvCg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="fortnitefpsboosterpvGl">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
